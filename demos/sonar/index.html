<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>外贸询盘操盘手 · 那一下</title>
<link rel="stylesheet" href="../../shared/theme.css">
<style>
  /* sonar 专属（scoped 前缀 sn-）。复用 theme.css token 与 .btn/.chip/.card/.field */
  .sn-lede{color:var(--ink-2); font-size:15px; margin:10px 0 0; max-width:640px}

  .sn-eg-label{font-size:13px; color:var(--ink-3); margin:22px 0 9px}
  .sn-egs{display:flex; flex-wrap:wrap; gap:9px}
  .sn-eg{border:1px solid var(--line); background:var(--surface); border-radius:999px;
    padding:9px 15px; cursor:pointer; font-size:14px; transition:.13s; display:inline-flex; align-items:center; gap:7px}
  .sn-eg:hover{border-color:var(--accent); color:var(--accent); transform:translateY(-1px)}
  .sn-eg .em{font-size:16px}
  .sn-inwrap{margin-top:16px}
  .sn-go{margin-top:12px}

  /* 评分头 */
  .sn-head{display:flex; gap:18px; align-items:center; flex-wrap:wrap; margin-top:10px}
  .sn-gauge{flex:none}
  .sn-headinfo{flex:1; min-width:220px}
  .sn-type{display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:700;
    border-radius:999px; padding:5px 13px; color:#fff}
  .sn-summary{font-size:16px; font-weight:620; line-height:1.45; margin-top:10px}

  /* 信号两栏 */
  .sn-sigs{display:grid; grid-template-columns:1fr; gap:8px; margin-top:18px}
  @media(min-width:640px){ .sn-sigs{grid-template-columns:1fr 1fr} }
  .sn-sig{display:flex; gap:9px; font-size:13.5px; line-height:1.5; border-radius:10px;
    padding:9px 12px; align-items:flex-start}
  .sn-sig .ic{flex:none}
  .sn-sig.good{background:rgba(45,158,123,.10); color:#1e6e52}
  .sn-sig.bad{background:rgba(214,69,69,.10); color:#a23b3b}

  /* 洞察卡 */
  .sn-cards{display:grid; grid-template-columns:1fr; gap:12px; margin-top:16px}
  @media(min-width:640px){ .sn-cards{grid-template-columns:1fr 1fr} }
  .sn-ic{border:1px solid var(--line); border-radius:12px; padding:13px 14px; background:#fbfbf9}
  .sn-ic .h{font-size:12px; letter-spacing:.03em; text-transform:uppercase; color:var(--ink-3);
    font-weight:680; display:flex; gap:6px; align-items:center; margin-bottom:6px}
  .sn-ic .b{font-size:14px; line-height:1.6; color:var(--ink-2)}

  /* 回复邮件 */
  .sn-mailhead{font-size:13px; font-weight:680; letter-spacing:.03em; text-transform:uppercase;
    color:var(--ink-3); margin:24px 0 9px; display:flex; align-items:center; gap:8px}
  .sn-maillang{font-size:11px; color:var(--accent); background:var(--accent-soft);
    border-radius:999px; padding:2px 9px; font-weight:600}
  .sn-mail{border:1px solid var(--line); border-left:3px solid var(--accent); border-radius:0 12px 12px 0;
    background:var(--surface); padding:15px 16px; font-size:14px; line-height:1.7; white-space:pre-wrap;
    color:var(--ink-1); font-family:"SF Mono",ui-monospace,"Cascadia Code",Menlo,Consolas,monospace}
  .sn-strategy{background:var(--accent-soft); border-radius:12px; padding:12px 14px; margin-top:12px;
    font-size:13.5px; line-height:1.6; color:var(--ink-2)}
  .sn-strategy b{color:var(--ink-3); font-weight:600; font-size:11px; letter-spacing:.03em;
    text-transform:uppercase; display:block; margin-bottom:4px}
  .sn-next{display:flex; gap:9px; align-items:flex-start; margin-top:14px; font-size:14px; line-height:1.6;
    color:var(--ink-2); background:#fbfbf9; border:1px solid var(--line); border-radius:12px; padding:12px 14px}

  .sn-bottom{display:flex; gap:10px; flex-wrap:wrap; margin-top:20px; padding-top:16px; border-top:1px solid var(--line-2)}
  .sn-bottom .btn{flex:1; min-width:140px}

  .sn-chain{font-size:12.5px; color:var(--ink-3); margin-top:22px; text-align:center; line-height:1.7}
  .sn-chain b{color:var(--ink-2)}

  .sn-oops{text-align:center; padding:10px 0}
  .sn-oops .big{font-size:40px}
  .sn-oops h3{font-size:19px; margin:10px 0 6px}
  .sn-oops p{color:var(--ink-2); font-size:14px; margin:0 auto 4px; max-width:420px}
</style>
</head>
<body>
<div id="app"></div>
<script src="../../registry.js"></script>
<script src="../../shared/app.js"></script>
<script src="./sonar.js"></script>
</body>
</html>
