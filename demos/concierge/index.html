<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Saltwater House · Villa Concierge</title>
  <meta name="description" content="24/7 AI villa concierge for Saltwater House, Byron Bay." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
<script defer src="../../assets/feedback.js"></script>
</head>
<body>
  <div class="stage">
    <main class="concierge" role="application" aria-label="Villa concierge chat">

      <!-- ░░ 品牌头部（替换真实房源时改 profile.js 的 BRAND）░░ -->
      <header class="hero">
        <div class="hero-bg" aria-hidden="true"></div>
        <div class="hero-row">
          <div class="crest" id="crest" aria-hidden="true">S</div>
          <div class="hero-text">
            <h1 class="villa-name" id="villaName">Saltwater House</h1>
            <p class="villa-tag" id="villaTag">Byron Bay · Private Coastal Villa</p>
          </div>
          <div class="status" title="Concierge online">
            <span class="dot"></span><span class="status-label">Concierge · 24/7</span>
          </div>
        </div>
      </header>

      <!-- ░░ 对话区 ░░ -->
      <section class="thread" id="thread" aria-live="polite"></section>

      <!-- ░░ 快捷提问 ░░ -->
      <div class="chips" id="chips"></div>

      <!-- ░░ 输入区 ░░ -->
      <form class="composer" id="composer" autocomplete="off">
        <input
          class="composer-input"
          id="input"
          type="text"
          placeholder="Ask anything · 用任何语言提问…"
          aria-label="Message the concierge"
        />
        <button class="send" id="send" type="submit" aria-label="Send">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
        </button>
      </form>

      <footer class="watermark">
        <span id="engineTag" class="engine" title="Connection status"></span>
        <span class="firm">A guest-experience demo · property-management concierge</span>
        <button class="gear" id="gear" type="button" aria-label="Settings" title="Use your own API key (local)">⚙</button>
      </footer>
    </main>
  </div>

  <script src="profile.js"></script>
  <script src="app.js"></script>
</body>
</html>
