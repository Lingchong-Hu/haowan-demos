<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AnyHome · 房源呈现物料生成器</title>
<!-- 唯一外链：html2canvas（cdnjs），仅用于把卡片导出 PNG。其余全内联。 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ════════════════════════════════════════════════════════════════
   AnyHome · 房源呈现物料生成器（anyhome-listing-card）
   自包含、无构建。vanilla JS + el() helper + BYOK LLM + 离线样张兜底。
   红线在代码里强制：缺失标「待补」不编造；通勤永远「草稿·请确认」；
   guarantor 命中必用 --accent 显著高亮块。只呈现，不判断。
   品牌 token 照抄 _SHARED.md（带 TODO: 替换品牌资产）。
   ════════════════════════════════════════════════════════════════ */
:root{
  --ink:#1c2b2a; --ink-2:#465856; --ink-3:#7c8b89; --ink-4:#a7b3b1;
  --paper:#f6f4ef; --surface:#fffefb; --surface-2:#faf7f1;
  --line:#e6e0d6; --line-2:#efeae0;
  --brand:#15706b;            /* AnyHome 主色 · 信任感的深青绿 */
  --brand-soft:#e4f0ee; --brand-line:#bcdedb;
  --accent:#c2410c;           /* 警示 / guarantor · 暖赭红 */
  --accent-soft:#fbe9df; --accent-line:#f0c3a6;
  --good:#2f7d5b; --good-soft:#e7f2ec;
  --warn:#b9842a; --warn-soft:#f7eed9;
  --r:14px; --r-s:9px; --r-l:22px;
  --sh-1:0 1px 2px rgba(20,40,38,.05), 0 3px 12px rgba(20,40,38,.05);
  --sh-2:0 12px 40px rgba(20,40,38,.10);
  --maxw:880px;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC","Hiragino Sans GB",system-ui,sans-serif;
  --serif:Georgia,"Songti SC","STSong","Noto Serif SC","Times New Roman",serif;
  --mono:"SFMono-Regular",ui-monospace,"Cascadia Code","Consolas","Menlo",monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans); color:var(--ink); background:var(--paper);
  -webkit-font-smoothing:antialiased; line-height:1.6; font-size:16px}
::selection{background:var(--brand-soft)}

/* ── 顶栏 ── */
.bar{position:sticky; top:0; z-index:40; backdrop-filter:saturate(1.3) blur(10px);
  background:rgba(246,244,239,.84); border-bottom:1px solid var(--line)}
.bar .in{max-width:var(--maxw); margin:0 auto; padding:11px 22px; display:flex; align-items:center; gap:12px}
.mark{display:flex; align-items:center; gap:9px; font-weight:650; font-size:15px; letter-spacing:-.2px}
.mark .glyph{width:22px; height:22px; flex:none; display:grid; place-items:center;
  border:1.5px solid var(--brand); border-radius:6px; color:var(--brand); font-size:12px; font-weight:800}
.bar .spacer{flex:1}
.bar .firm{font-size:11.5px; color:var(--ink-3); letter-spacing:.02em; white-space:nowrap}

.wrap{max-width:var(--maxw); margin:0 auto; padding:0 22px 90px}

/* ── Hero ── */
.hero{padding:42px 0 6px}
.hero .eyebrow{font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  color:var(--brand); margin-bottom:13px}
.hero h1{font-size:clamp(25px,4.4vw,34px); font-weight:740; letter-spacing:-.7px; line-height:1.16}
.hero h1 .em{color:var(--brand)}
.hero .lede{color:var(--ink-2); font-size:16px; margin:14px 0 0; max-width:660px; line-height:1.62}

/* ── 连接 AI 条 ── */
.aibar{display:flex; align-items:center; gap:9px; flex-wrap:wrap; margin:22px 0 0; font-size:13px}
.aidot{width:8px; height:8px; border-radius:50%; background:var(--ink-4); flex:none}
.aidot.on{background:var(--good)}
.aitxt{color:var(--ink-2)}
.ailink{border:none; background:none; color:var(--brand); font-weight:650; cursor:pointer; font-size:13px;
  text-decoration:underline; text-underline-offset:2px; padding:0; font-family:inherit}
.aipanel{flex-basis:100%; border:1px dashed var(--line); background:var(--surface-2); border-radius:var(--r-s);
  padding:14px 15px; margin-top:8px}
.aipanel p{margin:0 0 11px; font-size:12.5px; color:var(--ink-3); line-height:1.65}
.aipanel .row{display:flex; gap:8px; flex-wrap:wrap; align-items:center}

/* ── 输入区 ── */
.inblock{margin-top:20px}
.inhead{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:9px; flex-wrap:wrap; gap:6px}
.inhead .lab{font-size:13px; font-weight:650; color:var(--ink-2); letter-spacing:.01em}
.inhead .restore{font-size:12.5px; color:var(--brand); cursor:pointer; background:none; border:none; font-family:inherit; padding:0}
textarea.ta{width:100%; min-height:150px; border:1px solid var(--line); border-radius:12px; padding:15px 17px;
  font-size:15px; font-family:var(--sans); background:var(--surface); color:var(--ink); resize:vertical; line-height:1.62}
textarea.ta:focus{outline:none; border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-soft)}

/* 输入网格：学校 + 房源图 */
.ingrid{display:flex; gap:14px; flex-wrap:wrap; margin-top:14px}
.ingrid .col{flex:1; min-width:240px}
.ingrid .ml{font-size:13px; font-weight:650; color:var(--ink-2); margin-bottom:7px}
.sel, .field{border:1px solid var(--line); border-radius:9px; padding:11px 13px; font-size:14px; font-family:inherit;
  background:var(--surface); color:var(--ink); width:100%}
.sel:focus, .field:focus{outline:none; border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-soft)}
.imgrow{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
.imgrow .field{flex:1; min-width:150px}
.upbtn{border:1px solid var(--line); background:var(--surface); color:var(--ink-2); border-radius:9px;
  padding:11px 14px; font-size:13.5px; cursor:pointer; font-family:inherit; white-space:nowrap; transition:.13s}
.upbtn:hover{border-color:var(--brand); color:var(--brand)}
.imgnote{font-size:12px; color:var(--ink-3); margin-top:7px; line-height:1.5}

.go{margin-top:18px; width:100%; appearance:none; border:none; border-radius:12px; cursor:pointer;
  background:var(--brand); color:#fff; font-size:16px; font-weight:600; padding:15px; font-family:inherit;
  transition:.15s; display:inline-flex; align-items:center; justify-content:center; gap:9px}
.go:hover{filter:brightness(.96)}
.go:active{transform:translateY(1px)}
.go:disabled{opacity:.5; cursor:default}

/* ── 思考过场 ── */
.think{display:flex; flex-direction:column; align-items:center; gap:17px; padding:54px 0; text-align:center}
.spin{width:38px; height:38px; border-radius:50%; border:3px solid var(--line); border-top-color:var(--brand);
  animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.think .m{color:var(--ink-2); font-size:14.5px; min-height:21px}

/* ── 结果壳 ── */
.results{margin-top:30px; animation:rise .5s cubic-bezier(.2,.7,.2,1) both}
@keyframes rise{from{opacity:0; transform:translateY(12px)}to{opacity:1; transform:none}}
.res-head{display:flex; align-items:baseline; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:6px}
.res-head .t{font-size:13px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-3)}
.res-head .hint{font-size:12.5px; color:var(--ink-3)}

/* ════════════════ 推荐卡（竖版手机可读，可直接发私信） ════════════════ */
.cardwrap{display:flex; justify-content:center; margin-top:14px}
.card{width:420px; max-width:100%; background:var(--surface); border:1px solid var(--line);
  border-radius:var(--r-l); box-shadow:var(--sh-2); overflow:hidden}
.card-top{height:6px; background:linear-gradient(90deg,var(--brand),#1f9c93)}
/* 卡片品牌头 */
.card-brand{display:flex; align-items:center; gap:9px; padding:14px 20px 0}
.card-brand .glyph{width:20px; height:20px; flex:none; display:grid; place-items:center;
  border:1.5px solid var(--brand); border-radius:6px; color:var(--brand); font-size:11px; font-weight:800}
.card-brand .nm{font-weight:700; font-size:14px; letter-spacing:-.2px}
.card-brand .tag{margin-left:auto; font-size:10.5px; font-weight:600; color:var(--brand);
  background:var(--brand-soft); border-radius:999px; padding:3px 10px}

/* 顶部房源图 */
.photo{margin:13px 20px 0; height:188px; border-radius:14px; overflow:hidden; position:relative; background:var(--surface-2)}
.photo img{width:100%; height:100%; object-fit:cover; display:block}
/* 干净 CSS 占位图（不外链真实图片） */
.photo.placeholder{background:
  linear-gradient(135deg,var(--brand-soft) 0%, #d8e8e5 55%, #eef4f2 100%);
  display:grid; place-items:center}
.photo.placeholder .ph{display:flex; flex-direction:column; align-items:center; gap:8px; color:var(--brand); opacity:.8}
.photo.placeholder .ph .ico{font-size:34px; line-height:1}
.photo.placeholder .ph .tx{font-size:12px; letter-spacing:.06em; font-weight:600}

.card-pad{padding:16px 20px 20px}

/* 卡片标题 / 地址 / 价格 */
.head-line{display:flex; align-items:flex-start; gap:12px; justify-content:space-between}
.addr{font-size:18px; font-weight:730; letter-spacing:-.3px; line-height:1.25; flex:1; min-width:0}
.rent{flex:none; text-align:right}
.rent .num{font-size:20px; font-weight:780; color:var(--brand); letter-spacing:-.4px; font-variant-numeric:tabular-nums; white-space:nowrap}
.rent .per{font-size:11px; color:var(--ink-3)}

/* 基本信息小卡格 */
.facts{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:14px}
.fact{background:var(--surface-2); border:1px solid var(--line-2); border-radius:10px; padding:9px 11px}
.fact .k{font-size:10.5px; color:var(--ink-3); letter-spacing:.04em; text-transform:uppercase; margin-bottom:3px}
.fact .v{font-size:13.5px; font-weight:560; color:var(--ink); line-height:1.4}
.fact .v.todo{color:var(--ink-4); font-weight:500; font-style:italic}

/* section 通用 */
.csec{margin-top:18px}
.csec-h{font-size:12px; font-weight:700; letter-spacing:.06em; color:var(--ink-2);
  display:flex; align-items:center; gap:8px; margin-bottom:9px}
.csec-h .en{color:var(--ink-4); font-weight:500; letter-spacing:.02em}
.draftbadge{font-size:10px; font-weight:700; letter-spacing:.02em; color:var(--warn);
  background:var(--warn-soft); border:1px solid #e7d4a3; border-radius:999px; padding:2px 9px; white-space:nowrap}

/* 通勤行 */
.commute{display:flex; align-items:flex-start; gap:11px; background:var(--surface-2);
  border:1px solid var(--line-2); border-radius:12px; padding:12px 13px}
.commute .ico{font-size:19px; line-height:1.1; flex:none}
.commute .body{flex:1; min-width:0}
.commute .school{font-size:12px; color:var(--ink-3); margin-bottom:2px}
.commute .line{font-size:14px; font-weight:560; line-height:1.45}
.commute .mins{color:var(--brand); font-weight:700}
.commute .note{font-size:11.5px; color:var(--warn); margin-top:5px; line-height:1.45}

/* 优缺点 */
.prosc{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.pcol{border-radius:12px; padding:11px 12px}
.pcol.pro{background:var(--good-soft); border:1px solid #c9e4d6}
.pcol.con{background:var(--warn-soft); border:1px solid #e7d4a3}
.pcol .ph{font-size:11.5px; font-weight:700; margin-bottom:7px; display:flex; align-items:center; gap:5px}
.pcol.pro .ph{color:var(--good)}
.pcol.con .ph{color:var(--warn)}
.pcol ul{margin:0; padding:0; list-style:none}
.pcol li{font-size:12.5px; line-height:1.5; color:var(--ink-2); padding:3px 0 3px 14px; position:relative}
.pcol li::before{position:absolute; left:0; top:3px; font-size:11px}
.pcol.pro li::before{content:"＋"; color:var(--good)}
.pcol.con li::before{content:"－"; color:var(--warn)}

/* 关键条款 */
.terms{display:flex; flex-direction:column; gap:8px}
.term{display:flex; gap:10px; align-items:flex-start; background:var(--surface-2);
  border:1px solid var(--line-2); border-radius:10px; padding:10px 12px}
.term .k{font-size:11px; color:var(--ink-3); letter-spacing:.03em; width:108px; flex:none; line-height:1.5; padding-top:1px}
.term .v{flex:1; min-width:0; font-size:13.5px; font-weight:560; line-height:1.45}
.term .v.todo{color:var(--ink-4); font-weight:500; font-style:italic}

/* guarantor 显著高亮块（国际学生头号卡点，用 --accent 系） */
.guar{margin-top:8px; border:1.6px solid var(--accent-line); background:var(--accent-soft);
  border-radius:13px; padding:13px 14px; position:relative}
.guar .gbadge{display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:800;
  letter-spacing:.03em; text-transform:uppercase; color:#fff; background:var(--accent);
  border-radius:999px; padding:3px 11px; margin-bottom:9px}
.guar .gbadge .star{font-size:11px}
.guar .glabel{font-size:11px; color:var(--accent); font-weight:700; letter-spacing:.04em; text-transform:uppercase; margin-bottom:4px}
.guar .gval{font-size:14px; font-weight:600; color:var(--ink); line-height:1.5}
.guar .gval.todo{color:var(--ink-4); font-weight:500; font-style:italic}
.guar .ghint{font-size:11px; color:var(--ink-3); margin-top:8px; line-height:1.5; font-style:italic}

/* 引用文本（贴的链接 / 原文，仅作引用，不抓取） */
.cite{margin-top:14px; font-size:10.5px; color:var(--ink-4); line-height:1.5; border-top:1px dashed var(--line);
  padding-top:10px; word-break:break-all}
.cite b{color:var(--ink-3); font-weight:600; font-style:normal}

/* 卡片脚 */
.card-foot{margin-top:15px; padding-top:12px; border-top:1px solid var(--line); display:flex;
  align-items:center; gap:8px; font-size:10.5px; color:var(--ink-3)}
.card-foot .g{width:14px; height:14px; flex:none; display:grid; place-items:center;
  border:1.2px solid var(--brand); border-radius:4px; color:var(--brand); font-size:8px; font-weight:800}
.card-foot .sp{flex:1}

/* contenteditable 视觉提示（导出时去掉） */
[contenteditable="true"]{outline:none; border-radius:4px; transition:background .12s, box-shadow .12s; cursor:text}
[contenteditable="true"]:hover{background:rgba(21,112,107,.05)}
[contenteditable="true"]:focus{background:#fff; box-shadow:0 0 0 2px var(--brand-soft)}
.editing-off [contenteditable="true"]:hover{background:none}

/* ── 工具栏 ── */
.toolbar{display:flex; gap:10px; flex-wrap:wrap; margin-top:22px; max-width:420px; margin-left:auto; margin-right:auto}
.tool{flex:1; min-width:130px; appearance:none; border:1px solid var(--line); background:var(--surface);
  color:var(--ink); border-radius:10px; padding:12px; font-size:14px; font-weight:560; cursor:pointer;
  font-family:inherit; transition:.13s; display:inline-flex; align-items:center; justify-content:center; gap:7px}
.tool:hover{border-color:var(--brand); color:var(--brand)}
.tool.primary{background:var(--brand); border-color:var(--brand); color:#fff}
.tool.primary:hover{filter:brightness(.95); color:#fff}
.tool:disabled{opacity:.55; cursor:default}
.editnote{text-align:center; font-size:12px; color:var(--ink-3); margin-top:11px; line-height:1.55}
.editnote b{color:var(--ink-2); font-weight:600}

/* ── 脚注 ── */
.foot{margin-top:46px; padding-top:22px; border-top:1px solid var(--line); text-align:center}
.foot .pos{font-size:13.5px; color:var(--ink-2); line-height:1.6; max-width:560px; margin:0 auto}
.foot .pos b{color:var(--ink); font-weight:650}
.foot .brand{font-size:11.5px; color:var(--ink-4); margin-top:13px; letter-spacing:.04em}

/* ── 错误 ── */
.oops{text-align:center; padding:34px 0}
.oops .big{font-size:38px}
.oops h3{font-size:18px; margin:10px 0 6px}
.oops p{color:var(--ink-2); font-size:14px; margin:0 auto 14px; max-width:440px}

/* ── toast ── */
.toast{position:fixed; left:50%; bottom:30px; transform:translateX(-50%) translateY(18px);
  background:var(--ink); color:#fff; padding:11px 20px; border-radius:999px; font-size:14px;
  box-shadow:var(--sh-2); opacity:0; transition:.25s; z-index:100; pointer-events:none}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

.minibtn{appearance:none; border:1px solid var(--line); background:var(--surface); color:var(--ink);
  border-radius:9px; padding:11px 16px; font-size:14px; font-weight:560; cursor:pointer; font-family:inherit; white-space:nowrap}
.minibtn.primary{background:var(--brand); border-color:var(--brand); color:#fff}
.minibtn.ghost{background:transparent}

@media (max-width:640px){
  .wrap{padding:0 16px 70px}
  .card{width:100%}
  .card-pad{padding:15px 16px 18px}
  .photo{margin:13px 16px 0; height:170px}
  .card-brand{padding:13px 16px 0}
  .facts{grid-template-columns:1fr 1fr}
  .prosc{grid-template-columns:1fr}
  .toolbar .tool{min-width:0}
  .term .k{width:92px}
  .bar .firm{display:none}
}
@media (max-width:380px){
  .facts{grid-template-columns:1fr}
}
</style>
<script defer src="../../assets/feedback.js"></script>
</head>
<body>

<div class="bar">
  <div class="in">
    <!-- TODO: 替换品牌资产（wordmark / logo） -->
    <div class="mark"><span class="glyph">A</span>AnyHome</div>
    <div class="spacer"></div>
    <div class="firm">房源呈现物料生成器 · 呈现而非判断</div>
  </div>
</div>

<main class="wrap" id="app"></main>
<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";

/* ════════════════ el / clear / esc / toast / copy（照抄 _SHARED.md，勿改实现） ════════════════ */
function el(tag, props){
  const e = document.createElement(tag);
  if(props){ for(const k in props){ const v = props[k];
    if(v==null || v===false) continue;
    if(k==='class') e.className = v;
    else if(k==='html') e.innerHTML = v;
    else if(k==='text') e.textContent = v;
    else if(k==='style' && typeof v==='object') Object.assign(e.style, v);
    else if(k.slice(0,2)==='on' && typeof v==='function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }}
  for(let i=2;i<arguments.length;i++){ let kids=arguments[i]; if(!Array.isArray(kids)) kids=[kids];
    for(const kid of kids){ if(kid==null || kid===false) continue;
      e.appendChild(kid.nodeType ? kid : document.createTextNode(String(kid))); } }
  return e;
}
function clear(n){ while(n.firstChild) n.removeChild(n.firstChild); return n; }
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let toastT; function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1900); }
async function copy(text){ try{ await navigator.clipboard.writeText(text); toast('已复制 ✓'); }
  catch(e){ try{ const ta=el('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); toast('已复制 ✓'); }
    catch(_){ toast('复制失败，请手动选择'); } } }

/* ════════════════ 学校（NYC 留学生主力校） ════════════════ */
const SCHOOLS = [
  'NYU','Columbia','Parsons (The New School)','FIT','Pace',
  'Fordham (Lincoln Center)','Baruch (CUNY)','NYU Tandon','Cooper Union','其他（可输入）'
];

/* ════════════════ 内嵌 Claude system prompt（hand off「Demo 1」段，原样作为 SYS） ════════════════ */
const SYS = [
'你是 AnyHome 的房源信息抽取与呈现引擎。输入一段房源文字（中英混杂）+ 目标学校。',
'只抽取文字中字面存在的信息；缺失项标 null，绝不编造价格或条款。',
'通勤与周边优缺点可生成草稿（基于纽约地理常识），但通勤须标 is_draft:true。',
'绝不判断房源真伪或是否值得租。',
'只返回 JSON，无前后文无围栏。Schema：',
'{',
' "address","rent","layout","move_in","lease_term","furnished","utilities",',
' "commute":{"line":"地铁线路","minutes":int,"is_draft":true},',
' "neighborhood_pros":[..2-3..],"neighborhood_cons":[..2-3..],',
' "terms":{"broker_fee","deposit","guarantor_requirement","lease_length"}',
'}'
].join('\n');

/* ════════════════ LLM 连接器（照抄 _SHARED.md makeLLM，勿改函数实现） ════════════════ */
function makeLLM(SYS, maxTokens){
  const KEY_LS='haowan_anthropic_key', MODEL='claude-sonnet-4-6';
  const get=()=>{ try{ return localStorage.getItem(KEY_LS)||''; }catch(e){ return ''; } };
  const set=v=>{ try{ v?localStorage.setItem(KEY_LS,v):localStorage.removeItem(KEY_LS); }catch(e){} };
  const connected=()=> !!get();
  function safeParse(raw){ if(!raw) return null;
    let s=String(raw).trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
    try{ return JSON.parse(s); }catch(e){}
    const a=s.indexOf('{'), b=s.lastIndexOf('}');
    if(a>=0&&b>a){ try{ return JSON.parse(s.slice(a,b+1)); }catch(e){} } return null; }
  async function run(userText){
    const key=get(); if(!key){ const e=new Error('NEED_SETUP'); e.code='NEED_SETUP'; throw e; }
    let r; try{
      r = await fetch('https://api.anthropic.com/v1/messages',{ method:'POST',
        headers:{ 'x-api-key':key, 'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true', 'content-type':'application/json' },
        body: JSON.stringify({ model:MODEL, max_tokens:maxTokens||1200, system:SYS,
          messages:[ {role:'user', content:userText}, {role:'assistant', content:'{'} ] }) });
    }catch(e){ const err=new Error('NET'); err.code='NET'; throw err; }
    if(r.status===401){ const e=new Error('BAD_KEY'); e.code='BAD_KEY'; throw e; }
    if(!r.ok){ const e=new Error('HTTP_'+r.status); e.code='HTTP'; throw e; }
    const data=await r.json();
    const txt=(data.content && data.content[0] && data.content[0].text) || '';
    const obj=safeParse('{'+txt);
    if(!obj){ const e=new Error('PARSE_FAIL'); e.code='PARSE_FAIL'; throw e; } return obj; }
  function errMsg(err){ const c=err&&err.code;
    if(c==='NEED_SETUP') return '还没连接 AI，已显示离线示例';
    if(c==='BAD_KEY') return 'API Key 无效';
    if(c==='NET') return '连不上模型（注意：file:// 直接打开可能被浏览器拦截，请用本地 HTTP 预览）';
    if(c==='PARSE_FAIL') return 'AI 返回格式异常，请重试';
    return 'AI 生成失败，请重试'; }
  return { get,set,connected,run,errMsg };
}
const LLM = makeLLM(SYS, 1200);

/* ════════════════ guarantor 命中判定（红线：命中必显著高亮） ════════════════
   只要 terms.guarantor_requirement 字面有内容，就视为命中（包含 "required" / "guarantor" 等）。
   命中时不替学生给解法，只显著呈现条款。  */
function guarantorHit(val){
  if(val==null) return false;
  const s = String(val).trim();
  return s.length>0;
}

/* ════════════════ 归一（把模型结果并到固定结构，强制红线） ════════════════
   红线：缺失=null→渲染「待补」灰字，绝不补值。通勤强制 is_draft=true。  */
function normalize(raw){
  raw = raw || {};
  const txt = v => (v==null || v==='null' || (typeof v==='string' && v.trim()===''))
    ? null : String(v).trim();
  const arr = a => Array.isArray(a) ? a.map(x=>txt(x)).filter(x=>x!=null).slice(0,3) : [];

  const commuteIn = raw.commute || {};
  let mins = commuteIn.minutes;
  if(typeof mins==='string'){ const m = mins.match(/\d+/); mins = m ? parseInt(m[0],10) : null; }
  if(typeof mins!=='number' || isNaN(mins)) mins = null;

  const termsIn = raw.terms || {};
  return {
    address:    txt(raw.address),
    rent:       txt(raw.rent),
    layout:     txt(raw.layout),
    move_in:    txt(raw.move_in),
    lease_term: txt(raw.lease_term),
    furnished:  txt(raw.furnished),
    utilities:  txt(raw.utilities),
    commute: {
      line: txt(commuteIn.line),
      minutes: mins,
      is_draft: true   // 红线：通勤永远草稿
    },
    pros: arr(raw.neighborhood_pros),
    cons: arr(raw.neighborhood_cons),
    terms: {
      broker_fee:  txt(termsIn.broker_fee),
      deposit:     txt(termsIn.deposit),
      guarantor_requirement: txt(termsIn.guarantor_requirement),
      lease_length: txt(termsIn.lease_length)
    }
  };
}

/* ════════════════ PNG 导出（html2canvas，失败 try/catch 不白屏） ════════════════ */
async function exportPNG(btn){
  const node = document.getElementById('theCard');
  if(!node){ toast('没有可导出的卡片'); return; }
  if(typeof html2canvas!=='function'){
    toast('导出库未加载（file:// 或离线时可能拦截 CDN），请改用「复制文字版」'); return;
  }
  const label = btn ? btn.textContent : '';
  if(btn){ btn.disabled=true; btn.textContent='导出中…'; }
  // 导出态：隐藏可编辑高亮、失焦
  document.body.classList.add('editing-off');
  if(document.activeElement && document.activeElement.blur) document.activeElement.blur();
  try{
    const canvas = await html2canvas(node, {
      backgroundColor:'#ffffff', scale: Math.min(2, window.devicePixelRatio||1.5),
      useCORS:true, logging:false
    });
    const url = canvas.toDataURL('image/png');
    const a = el('a',{ href:url, download:'AnyHome-房源推荐卡.png' });
    document.body.appendChild(a); a.click(); a.remove();
    toast('已导出 PNG ✓');
  }catch(e){
    toast('导出失败（图片可能跨域污染画布）：可改用占位图或「复制文字版」');
  }finally{
    document.body.classList.remove('editing-off');
    if(btn){ btn.disabled=false; btn.textContent=label; }
  }
}

async function generate(){
  const ta = document.getElementById('ta');
  const text = (ta.value||'').trim();
  if(!text){ toast('先贴一段房源文字，或点「恢复示例」'); return; }
  const school = currentSchool();
  const img = currentImg();
  const cite = extractCite(text);

  const goBtn = document.getElementById('go');

  if(!LLM.connected()){
    // 离线：直接渲染样张（红线路径不依赖 key）
    renderResults(normalize(SAMPLE_RAW), school, img, cite);
    if(text.replace(/\s+/g,'') !== SAMPLE_TEXT.replace(/\s+/g,'')){
      toast('未连接 AI · 现展示离线示例卡（连接后可解析你贴的真实房源）');
    }
    mountResults.scrollIntoView({behavior:'smooth', block:'start'});
    return;
  }

  goBtn.disabled = true;
  const stage = el('div',{class:'results'});
  clear(mountResults); mountResults.appendChild(stage);
  const msgEl = el('div',{class:'m'}, THINK_MSGS[0]);
  stage.appendChild(el('div',{class:'think'}, el('div',{class:'spin'}), msgEl));
  stage.scrollIntoView({behavior:'smooth', block:'center'});
  let i=0; const timer=setInterval(()=>{ i=(i+1)%THINK_MSGS.length; msgEl.textContent=THINK_MSGS[i]; }, 900);

  const userText = '目标学校：'+school+'\n\n房源文字：\n'+text;
  try{
    const raw = await LLM.run(userText);
    clearInterval(timer);
    renderResults(normalize(raw), school, img, cite);
    mountResults.scrollIntoView({behavior:'smooth', block:'start'});
  }catch(err){
    clearInterval(timer);
    const card = el('div',{class:'results'},
      el('div',{class:'cardwrap'}, el('div',{class:'card', style:{width:'420px'}},
        el('div',{class:'card-top'}),
        el('div',{class:'card-pad'},
          el('div',{class:'oops'},
            el('div',{class:'big'},'🔌'),
            el('h3',null,'这次没生成成功'),
            el('p',null, LLM.errMsg(err)+'。可点上方「连接 AI」检查 Key，或重试；离线时也能看示例卡。'),
            el('div',{style:{display:'flex',gap:'10px',justifyContent:'center',flexWrap:'wrap'}},
              el('button',{class:'tool primary', style:{flex:'0 0 auto',minWidth:'120px'}, onClick:generate},'重试'),
              el('button',{class:'tool', style:{flex:'0 0 auto',minWidth:'120px'},
                onClick:()=>renderResults(normalize(SAMPLE_RAW), school, img, cite)},'看离线示例')))))));
    clear(mountResults); mountResults.appendChild(card);
  }finally{
    goBtn.disabled = false;
  }
}

    root.appendChild(el('span',{class:'aidot'+(on?' on':'')}));
    root.appendChild(el('span',{class:'aitxt'}, on
      ? '已连接 AI · 用真实模型（claude-sonnet-4-6）解析你贴的真实房源'
      : '未连接 · 现用离线示例卡（连接后可解析你贴的任意房源）'));
    root.appendChild(el('button',{class:'ailink', onClick:toggle}, on?'管理':'连接 AI'));
  }
  function toggle(){
    if(panel){ panel.remove(); panel=null; return; }
    const input = el('input',{class:'field', type:'password', autocomplete:'off',
      placeholder:'粘贴 Anthropic API Key（sk-ant-…）', value:LLM.get()});
    const save = el('button',{class:'minibtn primary', onClick:()=>{
      LLM.set(input.value.trim()); toast(input.value.trim()?'已连接 ✓':'已清除'); paint(); }}, '保存');
    const clr = LLM.get() ? el('button',{class:'minibtn ghost', onClick:()=>{ LLM.set(''); toast('已清除'); paint(); }}, '清除') : null;
    panel = el('div',{class:'aipanel'},
      el('p',{html:'纯静态演示、无后端。给一个 Anthropic API Key 即可用<b>真实模型</b>解析你自己的房源——'+
        'key <b>只存你本机浏览器</b>、不上传任何服务器；用 sonnet，单次花费极低。<br>'+
        '没有 key 也能完整看离线示例（Murray Hill 那条）。'}),
      el('div',{class:'row'}, input, save, clr));
    root.appendChild(panel); input.focus();
  }
  paint();
  return root;
}

/* ════════════════ 首屏 ════════════════ */
function home(){
  const app = document.getElementById('app');
  clear(app);

  app.appendChild(el('div',{class:'hero'},
    el('div',{class:'eyebrow'}, '房源呈现物料生成器'),
    el('h1',null, ['一条已判断好的房源，', el('br'), '5 分钟变成一张可发私信的', el('span',{class:'em'},'双语推荐卡')]),
    el('p',{class:'lede'},
      '把从 StreetEasy 复制的文字、或二房东微信发来的一段话，整段粘进来，选好学校 → '+
      '抽取成结构化的中英双语房源卡：基本信息、到校通勤（草稿·请确认）、周边优缺点、关键条款（guarantor 显著标出）。'+
      '每一项都可现场点改，一键导出 PNG。它只呈现你粘进来的信息，缺失标「待补」绝不编造。')
  ));

  app.appendChild(aiBar());

  const inblock = el('div',{class:'inblock'});
  // textarea
  inblock.appendChild(el('div',{class:'inhead'},
    el('span',{class:'lab'}, '房源文字（中英混杂都行 · 贴链接只当引用，不抓取）'),
    el('button',{class:'restore', onClick:()=>{ document.getElementById('ta').value = SAMPLE_TEXT; toast('已恢复示例房源'); }}, '↺ 恢复示例')));
  const ta = el('textarea',{class:'ta', id:'ta',
    placeholder:'把 StreetEasy 复制的文字 / 二房东微信发的一段话整段粘到这里…\n例：Sunny 1BR in Murray Hill, $3,200/mo. …'});
  ta.value = SAMPLE_TEXT;
  inblock.appendChild(ta);

  // 学校 + 房源图
  const grid = el('div',{class:'ingrid'});
  // 学校
  schoolSel = el('select',{class:'sel', id:'schoolSel', onChange:onSchoolChange});
  SCHOOLS.forEach(s=> schoolSel.appendChild(el('option',{value:s}, s)));
  schoolSel.value = 'NYU';
  schoolOther = el('input',{class:'field', id:'schoolOther', placeholder:'输入学校名…',
    style:{display:'none', marginTop:'8px'}});
  const schoolCol = el('div',{class:'col'},
    el('div',{class:'ml'},'目标学校 School'),
    schoolSel, schoolOther);
  grid.appendChild(schoolCol);

  // 房源图
  imgInput = el('input',{class:'field', id:'imgUrl', placeholder:'粘图片 URL（可选）',
    onChange:()=>{ imgFileData=''; }});
  const fileEl = el('input',{type:'file', accept:'image/*', style:{display:'none'},
    onChange:function(){ const f=this.files&&this.files[0]; if(!f) return;
      const rd=new FileReader(); rd.onload=()=>{ imgFileData=String(rd.result||''); imgInput.value=''; toast('已选图片 ✓'); };
      rd.readAsDataURL(f); }});
  const upBtn = el('button',{class:'upbtn', onClick:()=>fileEl.click()}, '上传图片');
  const imgCol = el('div',{class:'col'},
    el('div',{class:'ml'},'房源图 Photo（可选）'),
    el('div',{class:'imgrow'}, imgInput, upBtn, fileEl),
    el('div',{class:'imgnote'},'粘 URL 或上传一张，渲染在卡片顶部；留空则用干净占位图。注：跨域图片 URL 可能导致 PNG 导出失败，建议上传本地图。'));
  grid.appendChild(imgCol);

  inblock.appendChild(grid);

  inblock.appendChild(el('button',{class:'go', id:'go', onClick:generate}, ['✦ 生成推荐卡']));
  app.appendChild(inblock);

  mountResults = el('div'); app.appendChild(mountResults);

  // 首屏即渲染示例卡（验收 1：无需任何输入或 key）
  renderResults(normalize(SAMPLE_RAW), 'NYU', '', '');
}

function onSchoolChange(){
  const other = (schoolSel.value==='其他（可输入）');
  schoolOther.style.display = other ? 'block' : 'none';
  if(other) schoolOther.focus();
}

/* 开发自检钩子 */
window.LISTING_DEV = {
  render: (raw, school, img, cite)=>{ renderResults(normalize(raw||SAMPLE_RAW), school||'NYU', img||'', cite||''); },
  sample: SAMPLE_RAW, normalize, guarantorHit, cardText, exportPNG,
  sampleText: SAMPLE_TEXT
};

home();
})();
</script>
