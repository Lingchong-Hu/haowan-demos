<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>不被看穿 · 那一下</title>
<link rel="stylesheet" href="../../shared/theme.css">
<style>
  /* unmask 专属样式（scoped 前缀 um-） */
  .um-lede{color:var(--ink-2); font-size:15px; margin:10px 0 0; max-width:580px}
  .um-how{font-size:13px; color:var(--ink-3); line-height:1.75; background:#fbfbf9;
    border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-top:16px}
  .um-how b{color:var(--ink-2)}

  .um-lens{display:flex; gap:9px; flex-wrap:wrap; margin-top:16px}

  /* HUD */
  .um-hud{display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-top:6px}
  .um-round{font-weight:700; font-size:15px}
  .um-tallies{display:flex; gap:14px; margin-left:auto; font-size:13px; color:var(--ink-2)}
  .um-tallies b{font-variant-numeric:tabular-nums; font-weight:700}

  /* 可预测度仪表 */
  .um-meterwrap{margin:16px 0 6px; padding-bottom:18px}
  .um-meterhead{display:flex; justify-content:space-between; align-items:baseline; font-size:13px;
    color:var(--ink-2); margin-bottom:7px}
  .um-meterhead .pct{font-weight:800; font-size:17px; font-variant-numeric:tabular-nums}
  .um-meter{position:relative}
  .um-track{height:14px; background:var(--line-2); border-radius:999px; overflow:hidden}
  .um-fill{height:100%; border-radius:999px; width:33%; background:var(--good);
    transition:width .5s cubic-bezier(.2,.7,.2,1), background .4s}
  .um-base{position:absolute; top:-3px; height:20px; width:2px; background:var(--ink); opacity:.32}
  .um-base span{position:absolute; top:21px; left:-30px; font-size:10px; color:var(--ink-3); white-space:nowrap}

  /* 三选 */
  .um-choices{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:18px 0}
  .um-choice{border:1px solid var(--line); background:var(--surface); border-radius:18px;
    padding:20px 8px 14px; cursor:pointer; text-align:center; transition:.14s; font-family:inherit}
  .um-choice:hover{border-color:var(--accent); transform:translateY(-2px); box-shadow:var(--sh-1)}
  .um-choice:active{transform:translateY(0)}
  .um-choice:disabled{opacity:.45; cursor:default; transform:none; box-shadow:none}
  .um-choice .em{font-size:46px; line-height:1; display:block}
  .um-choice .nm{font-size:13px; color:var(--ink-2); margin-top:8px}

  /* 揭示 */
  .um-reveal{border:1px solid var(--line); border-radius:16px; padding:16px; background:var(--surface)}
  .um-vs{display:flex; align-items:center; justify-content:center; gap:22px}
  .um-vs .side{text-align:center}
  .um-vs .big{font-size:46px; line-height:1}
  .um-vs .lab{font-size:11.5px; color:var(--ink-3); margin-top:6px}
  .um-vs .mid{font-size:18px; color:var(--ink-3); font-weight:700}
  .um-outcome{text-align:center; font-size:18px; font-weight:760; margin-top:12px}
  .um-guess{text-align:center; font-size:13px; color:var(--ink-2); margin-top:8px; line-height:1.6}
  .um-guess .hit{color:var(--bad); font-weight:700}
  .um-guess .miss{color:var(--good); font-weight:700}
  .um-wait{text-align:center; color:var(--ink-3); font-size:14px; padding:26px 0}

  .um-hist{display:flex; gap:5px; flex-wrap:wrap; margin-top:16px; justify-content:center}
  .um-dot{width:24px; height:24px; border-radius:7px; display:flex; align-items:center; justify-content:center;
    font-size:13px; border:1px solid var(--line)}
  .um-dot.read{background:rgba(216,80,63,.14); border-color:rgba(216,80,63,.42)}
  .um-dot.win{background:rgba(46,158,123,.14); border-color:rgba(46,158,123,.42)}
  .um-dot.tie{background:var(--line-2)}

  /* 终局复盘 */
  .um-verdict{text-align:center; padding:6px 0 2px}
  .um-verdict .face{font-size:46px}
  .um-verdict h2{font-size:23px; margin:8px 0 4px}
  .um-verdict p{color:var(--ink-2); font-size:14.5px; margin:0 auto; max-width:440px; line-height:1.6}
  .um-patterns{margin-top:6px}
  .um-pat{border:1px solid var(--line); border-radius:12px; padding:13px 15px; background:var(--surface); margin-bottom:10px}
  .um-pat .t{font-size:12.5px; color:var(--ink-3); margin-bottom:3px}
  .um-pat .v{font-size:15px; color:var(--ink-1); line-height:1.5}
  .um-pat .v b{color:var(--accent)}

  @media (max-width:520px){
    .um-choice .em{font-size:40px}
    .um-vs .big{font-size:40px}
  }
</style>
</head>
<body>
<div id="app"></div>
<script src="../../registry.js"></script>
<script src="../../shared/app.js"></script>
<script src="./unmask.js"></script>
</body>
</html>
