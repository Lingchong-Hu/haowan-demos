<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>签约材料清单生成 · AnyHome</title>
<!-- html2canvas（仅用于「导出图片」，加载失败时导出按钮自带兜底，主路径不依赖它） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
<style>
/* ════════════════════════════════════════════════════════════════
   AnyHome · 签约材料清单生成 (anyhome-checklist) — 自包含，无构建。
   参照房型：展示门户/demos/probe。气质：concierge 文档级的克制与可靠。
   红线在代码里强制：纯确定性分支生成清单；只列材料，不谈判、不判断房源；
   不绝对化，处处标「以房东/楼盘要求为准」。
   ════════════════════════════════════════════════════════════════ */
:root{
  /* TODO: 替换品牌资产（以下为 AnyHome 占位品牌色） */
  --ink:#1c2b2a; --ink-2:#465856; --ink-3:#7c8b89; --ink-4:#a7b3b1;
  --paper:#f6f4ef; --surface:#fffefb; --surface-2:#faf7f1;
  --line:#e6e0d6; --line-2:#efeae0;
  --brand:#15706b;            /* AnyHome 主色 · 信任感的深青绿 */
  --brand-soft:#e4f0ee; --brand-line:#bcdedb;
  --accent:#c2410c;           /* 警示 / guarantor · 暖赭红 */
  --accent-soft:#fbe9df; --accent-line:#f0c3a6;
  --good:#2f7d5b; --good-soft:#e7f2ec;
  --warn:#b9842a; --warn-soft:#f7eed9;
  --r:14px; --r-s:9px; --r-l:22px;
  --sh-1:0 1px 2px rgba(20,40,38,.05), 0 3px 12px rgba(20,40,38,.05);
  --sh-2:0 12px 40px rgba(20,40,38,.10);
  --maxw:880px;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC","Hiragino Sans GB",system-ui,sans-serif;
  --serif:Georgia,"Songti SC","STSong","Noto Serif SC","Times New Roman",serif;
  --mono:"SFMono-Regular",ui-monospace,"Cascadia Code","Consolas","Menlo",monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans); color:var(--ink); background:var(--paper);
  -webkit-font-smoothing:antialiased; line-height:1.6; font-size:16px}
::selection{background:var(--brand-soft)}

/* ── 顶栏 ── */
.bar{position:sticky; top:0; z-index:40; backdrop-filter:saturate(1.3) blur(10px);
  background:rgba(246,244,239,.84); border-bottom:1px solid var(--line)}
.bar .in{max-width:var(--maxw); margin:0 auto; padding:11px 22px; display:flex; align-items:center; gap:12px}
.mark{display:flex; align-items:center; gap:9px; font-weight:650; font-size:15px; letter-spacing:-.2px}
.mark .glyph{width:22px; height:22px; flex:none; display:grid; place-items:center;
  border:1.5px solid var(--brand); border-radius:6px; color:var(--brand); font-size:12px; font-weight:800}
.bar .spacer{flex:1}
.bar .firm{font-size:11.5px; color:var(--ink-3); letter-spacing:.02em; white-space:nowrap}

.wrap{max-width:var(--maxw); margin:0 auto; padding:0 22px 90px}

/* ── Hero ── */
.hero{padding:42px 0 6px}
.hero .eyebrow{font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  color:var(--brand); margin-bottom:13px}
.hero h1{font-size:clamp(25px,4.4vw,35px); font-weight:740; letter-spacing:-.7px; line-height:1.16}
.hero h1 .em{color:var(--accent)}
.hero .lede{color:var(--ink-2); font-size:16px; margin:14px 0 0; max-width:680px; line-height:1.62}

/* ── 连接 AI 条 ── */
.aibar{display:flex; align-items:center; gap:9px; flex-wrap:wrap; margin:22px 0 0; font-size:13px}
.aidot{width:8px; height:8px; border-radius:50%; background:var(--ink-4); flex:none}
.aidot.on{background:var(--good)}
.aitxt{color:var(--ink-2)}
.ailink{border:none; background:none; color:var(--brand); font-weight:650; cursor:pointer; font-size:13px;
  text-decoration:underline; text-underline-offset:2px; padding:0; font-family:inherit}
.aipanel{flex-basis:100%; border:1px dashed var(--line); background:var(--surface-2); border-radius:var(--r-s);
  padding:14px 15px; margin-top:8px}
.aipanel p{margin:0 0 11px; font-size:12.5px; color:var(--ink-3); line-height:1.65}
.aipanel .row{display:flex; gap:8px; flex-wrap:wrap; align-items:center}

/* ── 问卷区 ── */
.quiz{margin-top:24px; border:1px solid var(--line); border-radius:var(--r-l); background:var(--surface);
  box-shadow:var(--sh-1); overflow:hidden}
.quiz-top{height:6px; background:linear-gradient(90deg,var(--brand),var(--accent))}
.quiz-pad{padding:24px 26px 26px}
.quiz-h{font-size:13px; font-weight:650; color:var(--ink-2); letter-spacing:.01em; margin-bottom:4px}
.quiz-sub{font-size:12.5px; color:var(--ink-3); margin-bottom:18px; line-height:1.55}
.qitem{padding:15px 0; border-top:1px solid var(--line-2)}
.qitem:first-of-type{border-top:none; padding-top:4px}
.qitem.hidden{display:none}
.qlabel{font-size:14.5px; font-weight:560; margin-bottom:10px; display:flex; align-items:baseline; gap:8px; flex-wrap:wrap}
.qlabel .en{color:var(--ink-3); font-weight:400; font-size:12.5px}
.qlabel .br{font-size:11px; font-weight:600; color:var(--accent); background:var(--accent-soft);
  border:1px solid var(--accent-line); border-radius:999px; padding:1px 8px}
.opts{display:flex; gap:8px; flex-wrap:wrap}
.opt{border:1px solid var(--line); background:var(--surface-2); color:var(--ink-2); border-radius:999px;
  padding:8px 15px; font-size:13.5px; cursor:pointer; font-family:inherit; transition:.13s; user-select:none}
.opt:hover{border-color:var(--brand); color:var(--ink)}
.opt.sel{background:var(--brand); border-color:var(--brand); color:#fff; font-weight:560}
.opt.sel.acc{background:var(--accent); border-color:var(--accent)}
select.field, input.field{border:1px solid var(--line); border-radius:9px; padding:10px 13px; font-size:14px;
  font-family:inherit; background:var(--surface); color:var(--ink); min-width:200px}
select.field:focus, input.field:focus{outline:none; border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-soft)}
.go{margin-top:20px; width:100%; appearance:none; border:none; border-radius:12px; cursor:pointer;
  background:var(--ink); color:#fff; font-size:16px; font-weight:600; padding:15px; font-family:inherit;
  transition:.15s; display:inline-flex; align-items:center; justify-content:center; gap:9px}
.go:hover{background:#0f1c1b}
.go:active{transform:translateY(1px)}
.go:disabled{opacity:.5; cursor:default}
.quiz-foot{display:flex; gap:10px; flex-wrap:wrap; margin-top:11px; align-items:center}
.quiz-foot .preset{font-size:12.5px; color:var(--ink-3); margin-right:2px}
.preset-b{border:1px solid var(--line); background:var(--surface); color:var(--ink-2); border-radius:999px;
  padding:6px 12px; font-size:12.5px; cursor:pointer; font-family:inherit; transition:.13s}
.preset-b:hover{border-color:var(--brand); color:var(--ink)}

/* ── 思考过场（仅润色时） ── */
.think{display:flex; flex-direction:column; align-items:center; gap:17px; padding:46px 0; text-align:center}
.spin{width:34px; height:34px; border-radius:50%; border:3px solid var(--line); border-top-color:var(--brand);
  animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.think .m{color:var(--ink-2); font-size:14px; min-height:21px}

/* ── 结果壳 ── */
.results{margin-top:30px; animation:rise .5s cubic-bezier(.2,.7,.2,1) both}
@keyframes rise{from{opacity:0; transform:translateY(12px)}to{opacity:1; transform:none}}

.sec-eyebrow{font-size:12px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3);
  margin:30px 0 4px; display:flex; align-items:center; gap:8px}
.sec-eyebrow .badge{font-size:11px; font-weight:600; letter-spacing:.02em; text-transform:none;
  background:var(--brand-soft); color:var(--brand); padding:2px 9px; border-radius:999px}

/* ── 清单文档 ── */
.doc{margin-top:18px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-l);
  box-shadow:var(--sh-2); overflow:hidden}
.doc-top{height:6px; background:linear-gradient(90deg,var(--brand),var(--accent))}
.doc-pad{padding:32px 36px 36px}
.doc-mast{border-bottom:2px solid var(--ink); padding-bottom:16px; margin-bottom:8px}
.doc-mast .kanji{font-family:var(--serif); font-size:12.5px; letter-spacing:.34em; color:var(--ink-3);
  text-transform:uppercase; margin-bottom:9px}
.doc-mast h2{font-family:var(--serif); font-size:26px; font-weight:700; letter-spacing:.4px; line-height:1.2}
.doc-mast .sub{font-size:13px; color:var(--ink-3); margin-top:9px; display:flex; gap:14px; flex-wrap:wrap}
.doc-mast .sub b{color:var(--ink-2); font-weight:600}

/* 路径徽章 */
.pathrow{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px}
.pbadge{font-size:12px; font-weight:600; border-radius:999px; padding:4px 12px;
  background:var(--brand-soft); color:var(--brand); border:1px solid var(--brand-line)}
.pbadge.acc{background:var(--accent-soft); color:var(--accent); border-color:var(--accent-line)}

/* guarantor 显著高亮块（国际学生头号卡点） */
.guar{margin:20px 0 4px; border:1.5px solid var(--accent-line); background:var(--accent-soft);
  border-radius:14px; padding:15px 17px}
.guar .gh{display:inline-flex; align-items:center; gap:7px; font-size:11.5px; font-weight:700; letter-spacing:.02em;
  color:var(--accent); text-transform:uppercase; background:var(--surface); border:1px solid var(--accent-line);
  border-radius:999px; padding:3px 11px; margin-bottom:10px}
.guar .gt{font-size:14px; color:var(--ink); line-height:1.62}
.guar .gt b{color:var(--accent)}

/* 段 */
.dsec{margin-top:26px}
.dsec-h{font-family:var(--serif); font-size:12px; font-weight:700; letter-spacing:.2em; color:var(--brand);
  text-transform:uppercase; padding-bottom:7px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:9px}
.dsec-h .no{font-family:var(--mono); color:var(--ink-4); font-size:11px; letter-spacing:0}
.dsec-h .en{color:var(--ink-3); font-weight:600; letter-spacing:.06em}

.item{display:flex; gap:13px; padding:13px 0; border-bottom:1px solid var(--line-2); align-items:flex-start}
.item:last-child{border-bottom:none}
.item .chk{width:19px; height:19px; flex:none; border:1.6px solid var(--brand-line); border-radius:5px;
  margin-top:2px; background:var(--surface)}
.item .body{flex:1; min-width:0}
.item .zh{font-size:14.5px; font-weight:560; line-height:1.5}
.item .zh .tag{font-size:11px; font-weight:600; padding:1px 8px; border-radius:999px; margin-left:8px;
  background:var(--brand-soft); color:var(--brand)}
.item .zh .tag.acc{background:var(--accent-soft); color:var(--accent)}
.item .en{font-size:13px; color:var(--ink-3); margin-top:2px; line-height:1.5}
.item .why{font-size:12.5px; color:var(--ink-2); margin-top:6px; line-height:1.55;
  padding-left:11px; border-left:3px solid var(--brand-line)}
.item .why .wl{font-weight:700; color:var(--brand); margin-right:5px}

/* 底部免责 */
.disc{margin:24px 0 2px; font-size:12.5px; color:var(--ink-2); background:var(--warn-soft);
  border:1px solid var(--warn); border-radius:var(--r-s); padding:12px 15px; line-height:1.62; display:flex; gap:9px}
.disc .ic{flex:none; font-size:14px}
.disc b{color:var(--ink)}

/* ── 工具栏 / 脚注 ── */
.toolbar{display:flex; gap:10px; flex-wrap:wrap; margin-top:24px}
.tool{flex:1; min-width:140px; appearance:none; border:1px solid var(--line); background:var(--surface);
  color:var(--ink); border-radius:10px; padding:12px; font-size:14px; font-weight:560; cursor:pointer;
  font-family:inherit; transition:.13s; display:inline-flex; align-items:center; justify-content:center; gap:7px}
.tool:hover{border-color:var(--brand); color:var(--brand)}
.tool.primary{background:var(--brand); border-color:var(--brand); color:#fff}
.tool.primary:hover{filter:brightness(.95); color:#fff}
.tool:disabled{opacity:.5; cursor:default}

.foot{margin-top:46px; padding-top:22px; border-top:1px solid var(--line); text-align:center}
.foot .pos{font-size:13.5px; color:var(--ink-2); line-height:1.6; max-width:580px; margin:0 auto}
.foot .pos b{color:var(--ink); font-weight:650}
.foot .brand{font-size:11.5px; color:var(--ink-4); margin-top:13px; letter-spacing:.04em}

/* ── toast ── */
.toast{position:fixed; left:50%; bottom:30px; transform:translateX(-50%) translateY(18px);
  background:var(--ink); color:#fff; padding:11px 20px; border-radius:999px; font-size:14px;
  box-shadow:var(--sh-2); opacity:0; transition:.25s; z-index:100; pointer-events:none}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

.field-pw{border:1px solid var(--line); border-radius:9px; padding:11px 13px; font-size:14px; font-family:inherit;
  background:var(--surface); color:var(--ink); flex:1; min-width:200px}
.field-pw:focus{outline:none; border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-soft)}
.minibtn{appearance:none; border:1px solid var(--line); background:var(--surface); color:var(--ink);
  border-radius:9px; padding:11px 16px; font-size:14px; font-weight:560; cursor:pointer; font-family:inherit; white-space:nowrap}
.minibtn.primary{background:var(--brand); border-color:var(--brand); color:#fff}
.minibtn.ghost{background:transparent}

@media (max-width:640px){
  .wrap{padding:0 16px 70px}
  .quiz-pad{padding:20px 18px 22px}
  .doc-pad{padding:22px 18px 26px}
  .doc-mast h2{font-size:21px}
  .toolbar .tool{min-width:0}
  .bar .firm{display:none}
  .item .why{padding-left:9px}
}
</style>
<script defer src="../../assets/feedback.js"></script>
</head>
<body>

<div class="bar">
  <div class="in">
    <!-- TODO: 替换品牌资产（wordmark / logo） -->
    <div class="mark"><span class="glyph">A</span>AnyHome</div>
    <div class="spacer"></div>
    <div class="firm">签约材料清单 · 省口头重复解释，不替你判断房源</div>
  </div>
</div>

<main class="wrap" id="app"></main>
<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";

/* ════════════════ 工具（照抄 _SHARED.md，勿改） ════════════════ */
function el(tag, props){
  const e = document.createElement(tag);
  if(props){ for(const k in props){ const v = props[k];
    if(v==null || v===false) continue;
    if(k==='class') e.className = v;
    else if(k==='html') e.innerHTML = v;
    else if(k==='text') e.textContent = v;
    else if(k==='style' && typeof v==='object') Object.assign(e.style, v);
    else if(k.slice(0,2)==='on' && typeof v==='function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }}
  for(let i=2;i<arguments.length;i++){ let kids=arguments[i]; if(!Array.isArray(kids)) kids=[kids];
    for(const kid of kids){ if(kid==null || kid===false) continue;
      e.appendChild(kid.nodeType ? kid : document.createTextNode(String(kid))); } }
  return e;
}
function clear(n){ while(n.firstChild) n.removeChild(n.firstChild); return n; }
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let toastT; function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1900); }
async function copy(text){ try{ await navigator.clipboard.writeText(text); toast('已复制 ✓'); }
  catch(e){ try{ const ta=el('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); toast('已复制 ✓'); }
    catch(_){ toast('复制失败，请手动选择'); } } }

/* ════════════════ LLM 连接器（照抄 _SHARED.md makeLLM，仅换 SYS / max_tokens） ════════════════ */
function makeLLM(SYS, maxTokens){
  const KEY_LS='haowan_anthropic_key', MODEL='claude-sonnet-4-6';
  const get=()=>{ try{ return localStorage.getItem(KEY_LS)||''; }catch(e){ return ''; } };
  const set=v=>{ try{ v?localStorage.setItem(KEY_LS,v):localStorage.removeItem(KEY_LS); }catch(e){} };
  const connected=()=> !!get();
  function safeParse(raw){ if(!raw) return null;
    let s=String(raw).trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
    try{ return JSON.parse(s); }catch(e){}
    const a=s.indexOf('{'), b=s.lastIndexOf('}');
    if(a>=0&&b>a){ try{ return JSON.parse(s.slice(a,b+1)); }catch(e){} } return null; }
  async function run(userText){
    const key=get(); if(!key){ const e=new Error('NEED_SETUP'); e.code='NEED_SETUP'; throw e; }
    let r; try{
      r = await fetch('https://api.anthropic.com/v1/messages',{ method:'POST',
        headers:{ 'x-api-key':key, 'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true', 'content-type':'application/json' },
        body: JSON.stringify({ model:MODEL, max_tokens:maxTokens||1200, system:SYS,
          messages:[ {role:'user', content:userText}, {role:'assistant', content:'{'} ] }) });
    }catch(e){ const err=new Error('NET'); err.code='NET'; throw err; }
    if(r.status===401){ const e=new Error('BAD_KEY'); e.code='BAD_KEY'; throw e; }
    if(!r.ok){ const e=new Error('HTTP_'+r.status); e.code='HTTP'; throw e; }
    const data=await r.json();
    const txt=(data.content && data.content[0] && data.content[0].text) || '';
    const obj=safeParse('{'+txt);
    if(!obj){ const e=new Error('PARSE_FAIL'); e.code='PARSE_FAIL'; throw e; } return obj; }
  function errMsg(err){ const c=err&&err.code;
    if(c==='NEED_SETUP') return '还没连接 AI，已显示模板清单';
    if(c==='BAD_KEY') return 'API Key 无效';
    if(c==='NET') return '连不上模型（注意：file:// 直接打开可能被浏览器拦截，请用本地 HTTP 预览）';
    if(c==='PARSE_FAIL') return 'AI 返回格式异常，已用模板清单';
    return 'AI 生成失败，已用模板清单'; }
  return { get,set,connected,run,errMsg };
}

/* 润色用 system prompt：只许改措辞，不许增删条目、不许填数字。 */
const POLISH_SYS = [
'你是 AnyHome 的中文文案润色器。我会给你一份 NYC 租房签约材料 checklist 的条目数组。',
'你的唯一任务：把每条的 zh（中文名）与 why（为什么需要）润色得更友好、更口语、更让留学生安心。',
'铁律：',
'  1. 绝不增加或删除任何条目，数组长度与 id 必须与输入完全一致；',
'  2. 绝不修改 en（英文专有名词原样保留）；',
'  3. 绝不写入任何具体金额、月数、利率、机构报价等数字（这些由房东/楼盘决定，本工具不替学生判断）；',
'  4. 不谈判、不评价房源、不给"怎么解决"的建议——只润色"是什么 / 为什么需要"的表述。',
'只返回 JSON，无前后文、无 markdown 围栏。Schema：',
'{ "items": [ { "id":"原样id", "zh":"润色后中文名", "why":"润色后为什么需要" }, ... ] }'
].join('\n');
const LLM = makeLLM(POLISH_SYS, 1400);

/* ════════════════ 问卷模型（短问卷 · 单选/是否） ════════════════ */
const VISAS = ['F-1','J-1','M-1','OPT / STEM-OPT','H-1B','绿卡 / Permanent Resident','其他 / 待定'];
// 默认身份组合：典型国际学生 —— 无美国信用 + 无收入 + 想用 guarantor service
const DEFAULT_PROFILE = {
  credit:'no',      // 是否有美国信用记录
  income:'no',      // 是否有美国收入/offer
  usGuarantor:'no', // 是否有可用 US guarantor
  visa:'F-1',       // 签证/身份
  noCreditPlan:'service' // 无信用时的方案：'guarantor'(US co-signer) | 'service' | 'prepay'
};

/* ════════════════ 清单数据源（纯确定性 · 模板渲染） ════════════════
   每条：{ id, zh, en, why, tag? }。tag 用于标 guarantor / 高亮项。
   所有条目均为通用 NYC 租赁申请常见要求，不含任何具体数字。           */

/* 主分支函数：profile → checklist 对象 */
function buildChecklist(p){
  p = p || DEFAULT_PROFILE;
  let result;
  // 主分支：有美国信用 + 收入 → 标准；否则走 guarantor/无收入路径
  if(p.credit==='yes' && p.income==='yes'){
    result = pathHasCredit(p);
  } else {
    // 无信用 / 无收入。若本人有 US guarantor，优先 US guarantor；否则按所选方案。
    let plan = p.noCreditPlan;
    if(p.usGuarantor==='yes') plan = 'guarantor';
    if(plan==='guarantor') result = pathUSGuarantor(p);
    else if(plan==='prepay') result = pathPrepay(p);
    else result = pathService(p); // 默认 service（典型国际学生）
  }
  result.profile = p;
  return result;
}

// guarantor 高亮文案（按路径）
function guarHighlight(d){
  const g = d.guarantor;
  if(g==='us') return ['核心卡点 · US Guarantor','这一单走 <b>US guarantor（美国担保人）</b> 路径：房东要的不只是你的材料，更要担保人的<b>收入、信用、身份</b>三件套。担保人的信用与收入要求通常比租客本人更高 —— 具体口径以房东 / 楼盘要求为准。'];
  if(g==='service') return ['核心卡点 · Guarantor Service','这一单走 <b>担保服务（Insurent / TheGuarantors）</b>：先确认楼盘<b>是否接受</b>该 service，再走 service 自己的申请。服务会收一笔费用、并在批准后出担保凭证交给房东。'];
  if(g==='prepay') return ['核心卡点 · Prepay 预付','这一单走 <b>预付</b>：是否接受、预付<b>几个月</b>由房东决定 —— 本工具不替你定月数。核心是用<b>足额资金证明</b>让房东放心。'];
  return null;
}

/* ── 文本导出 ── */
function checklistText(d){
  const L = ['【AnyHome · 签约材料清单】  身份：'+(d.profile.visa||'F-1'), '路径：'+d.pathLabel, ''];
  d.sections.forEach(sec=>{
    L.push('— '+sec.zh+' / '+sec.en+' —');
    sec.items.forEach(it=>{
      L.push('☐ '+it.zh + (it.tag?('（'+it.tag+'）'):''));
      L.push('   '+it.en);
      L.push('   · 为什么需要：'+it.why);
    });
    L.push('');
  });
  L.push('※ 本清单基于通用 NYC 租赁申请要求，具体含金额/月数/担保方式一律以你所申请的房东/楼盘要求为准。');
  L.push('—— AnyHome · 只列材料，不谈判、不判断房源');
  return L.join('\n');
}

/* ── 导出图片（html2canvas，try/catch 兜底） ── */
async function exportImage(d){
  const node = document.getElementById('doc');
  const btn = document.getElementById('exportBtn');
  if(typeof window.html2canvas !== 'function'){
    toast('图片库未加载，已改为复制文字清单');
    copy(checklistText(d));
    return;
  }
  if(btn){ btn.disabled = true; btn.textContent = '⏳ 生成图片中…'; }
  try{
    const canvas = await window.html2canvas(node, {
      backgroundColor:'#fffefb', scale: Math.min(2, window.devicePixelRatio||1), useCORS:true, logging:false });
    const url = canvas.toDataURL('image/png');
    const a = el('a',{href:url, download:'AnyHome-签约材料清单.png'});
    document.body.appendChild(a); a.click(); a.remove();
    toast('已导出图片 ✓');
  }catch(err){
    toast('导出图片失败，已改为复制文字清单');
    copy(checklistText(d));
  }finally{
    if(btn){ btn.disabled = false; btn.textContent = '🖼 导出图片'; }
  }
}

/* ════════════════ 可选润色（Claude） ════════════════ */
function flattenItems(d){
  const arr = [];
  d.sections.forEach(s=> s.items.forEach(it=> arr.push({ id:it.id, zh:it.zh, en:it.en, why:it.why })));
  return arr;
}
function applyPolish(d, items){
  if(!items || !Array.isArray(items)) return;
  const map = {};
  items.forEach(it=>{ if(it && it.id) map[it.id] = it; });
  d.sections.forEach(s=> s.items.forEach(it=>{
    const m = map[it.id];
    if(m){
      if(m.zh && typeof m.zh==='string') it.zh = m.zh;
      if(m.why && typeof m.why==='string') it.why = m.why;
      // en 永不改（红线）；tag 永不改
    }
  }));
}

const POLISH_MSGS = ['按你的身份匹配分支…','整理需要的材料…','把措辞润色得更友好…','补上每条"为什么需要"…'];
async function generate(p, opts){
  opts = opts || {};
  const d = buildChecklist(p);

  // 未连接 key：直接渲染模板清单（主路径，绝不白屏）
  if(!opts.polish || !LLM.connected()){
    renderChecklist(d);
    mountResults.scrollIntoView({behavior:'smooth', block:'start'});
    return;
  }

  // 连接了 key 且选择润色：先放思考过场，失败则回退模板
  const stage = el('div',{class:'results'});
  clear(mountResults); mountResults.appendChild(stage);
  const msgEl = el('div',{class:'m'}, POLISH_MSGS[0]);
  stage.appendChild(el('div',{class:'think'}, el('div',{class:'spin'}), msgEl));
  stage.scrollIntoView({behavior:'smooth', block:'center'});
  let i=0; const timer = setInterval(()=>{ i=(i+1)%POLISH_MSGS.length; msgEl.textContent = POLISH_MSGS[i]; }, 850);

  try{
    const payload = JSON.stringify({ items: flattenItems(d) });
    const raw = await LLM.run('这是需要润色的 checklist 条目（保持 id 与数组长度不变）：\n'+payload);
    clearInterval(timer);
    applyPolish(d, raw && raw.items);
    renderChecklist(d);
    mountResults.scrollIntoView({behavior:'smooth', block:'start'});
    toast('已用 AI 润色措辞 ✓');
  }catch(err){
    clearInterval(timer);
    renderChecklist(d); // 失败兜底：模板清单照常出
    mountResults.scrollIntoView({behavior:'smooth', block:'start'});
    toast(LLM.errMsg(err));
  }
}

/* ════════════════ AI 连接条（照抄 probe aiBar，文案微调） ════════════════ */
let polishWanted = false;
function aiBar(){
  const root = el('div',{class:'aibar'}); let panel=null;
  function paint(){
    clear(root); panel=null;
    const on = LLM.connected();
    root.appendChild(el('span',{class:'aidot'+(on?' on':'')}));
    root.appendChild(el('span',{class:'aitxt'}, on
      ? '已连接 AI · 生成时可选用模型把清单措辞润色得更友好（claude-sonnet-4-6）'
      : '未连接 · 清单为确定性模板生成，无需 key 即出完整正确清单（连接后可选润色措辞）'));
    root.appendChild(el('button',{class:'ailink', onClick:toggle}, on?'管理':'连接 AI（可选）'));
  }
  function toggle(){
    if(panel){ panel.remove(); panel=null; return; }
    const input = el('input',{class:'field-pw', type:'password', autocomplete:'off',
      placeholder:'粘贴 Anthropic API Key（sk-ant-…）', value:LLM.get()});
    const save = el('button',{class:'minibtn primary', onClick:()=>{
      LLM.set(input.value.trim()); toast(input.value.trim()?'已连接 ✓':'已清除'); paint(); }}, '保存');
    const clr = LLM.get() ? el('button',{class:'minibtn ghost', onClick:()=>{ LLM.set(''); toast('已清除'); paint(); }}, '清除') : null;
    panel = el('div',{class:'aipanel'},
      el('p',{html:'纯静态演示、无后端。<b>清单本身完全由确定性分支生成，不需要 key 也准确</b>。'+
        '给一个 Anthropic API Key 仅用于<b>可选</b>把中文措辞润色得更友好——'+
        'key <b>只存你本机浏览器</b>、不上传任何服务器；用 sonnet，单次花费极低。AI 不会改动材料项本身或英文术语。'}),
      el('div',{class:'row'}, input, save, clr));
    root.appendChild(panel); input.focus();
  }
  paint();
  return root;
}

/* ════════════════ 问卷 UI ════════════════ */
const STATE = Object.assign({}, DEFAULT_PROFILE);

function segGroup(opts, getVal, setVal, accent){
  // opts: [{v,label,en}]
  const row = el('div',{class:'opts'});
  function paint(){
    Array.from(row.children).forEach((c,i)=>{
      const on = opts[i].v===getVal();
      c.className = 'opt'+(on?(' sel'+(accent?' acc':'')):'');
    });
  }
  opts.forEach(o=>{
    row.appendChild(el('div',{class:'opt', onClick:()=>{ setVal(o.v); paint(); onProfileChange(); }},
      [ o.label, o.en?el('span',null,' · '+o.en):null ]));
  });
  paint();
  return { row, paint };
}

let quizRefs = {};
function onProfileChange(){
  // 控制分支题目显隐
  const noCredit = !(STATE.credit==='yes' && STATE.income==='yes');
  // 无信用/收入 → 显示 US guarantor 题；若无 US guarantor → 显示方案题
  quizRefs.usGuarItem.classList.toggle('hidden', !noCredit);
  const showPlan = noCredit && STATE.usGuarantor!=='yes';
  quizRefs.planItem.classList.toggle('hidden', !showPlan);
  // 同步各 seg 高亮
  Object.values(quizRefs.paints).forEach(fn=>fn && fn());
}

function buildQuiz(){
  const box = el('div',{class:'quiz', id:'quiz'});
  box.appendChild(el('div',{class:'quiz-top'}));
  const pad = el('div',{class:'quiz-pad'});
  box.appendChild(pad);

  pad.appendChild(el('div',{class:'quiz-h'}, '先回答几个问题（单选）'));
  pad.appendChild(el('div',{class:'quiz-sub'}, '据此生成你这一单要准备的签约材料。默认已按「典型国际学生」预填，可直接生成或按需修改。'));

  quizRefs.paints = {};

  // Q1 信用
  const q1 = el('div',{class:'qitem'});
  q1.appendChild(el('div',{class:'qlabel'}, ['是否有美国信用记录？', el('span',{class:'en'},'U.S. credit history')]));
  const g1 = segGroup([{v:'yes',label:'有'},{v:'no',label:'没有'}], ()=>STATE.credit, v=>STATE.credit=v);
  q1.appendChild(g1.row); quizRefs.paints.credit=g1.paint; pad.appendChild(q1);

  // Q2 收入
  const q2 = el('div',{class:'qitem'});
  q2.appendChild(el('div',{class:'qlabel'}, ['是否有美国收入 / offer？', el('span',{class:'en'},'U.S. income / job offer')]));
  const g2 = segGroup([{v:'yes',label:'有'},{v:'no',label:'没有'}], ()=>STATE.income, v=>STATE.income=v);
  q2.appendChild(g2.row); quizRefs.paints.income=g2.paint; pad.appendChild(q2);

  // Q3 US guarantor（分支）
  const q3 = el('div',{class:'qitem'});
  q3.appendChild(el('div',{class:'qlabel'}, ['是否有可用的 US guarantor（美国担保人）？', el('span',{class:'en'},'US-based guarantor'), el('span',{class:'br'},'分支')]));
  const g3 = segGroup([{v:'yes',label:'有'},{v:'no',label:'没有 / 不确定'}], ()=>STATE.usGuarantor, v=>STATE.usGuarantor=v, true);
  q3.appendChild(g3.row); quizRefs.paints.usGuarantor=g3.paint; quizRefs.usGuarItem=q3; pad.appendChild(q3);

  // Q4 方案（仅无 US guarantor 时）
  const q4 = el('div',{class:'qitem'});
  q4.appendChild(el('div',{class:'qlabel'}, ['没有 US guarantor 时，你打算走哪种方式？', el('span',{class:'en'},'guarantor service or prepay'), el('span',{class:'br'},'分支')]));
  const g4 = segGroup([
    {v:'service',label:'用担保服务',en:'Insurent / TheGuarantors'},
    {v:'prepay',label:'预付租金',en:'prepay'}
  ], ()=>STATE.noCreditPlan, v=>STATE.noCreditPlan=v, true);
  q4.appendChild(g4.row); quizRefs.paints.noCreditPlan=g4.paint; quizRefs.planItem=q4; pad.appendChild(q4);

  // Q5 签证
  const q5 = el('div',{class:'qitem'});
  q5.appendChild(el('div',{class:'qlabel'}, ['签证 / 身份？', el('span',{class:'en'},'Visa / status')]));
  const sel = el('select',{class:'field', onChange:(e)=>{ STATE.visa = e.target.value; }});
  VISAS.forEach(v=> sel.appendChild(el('option',{value:v, selected: v===STATE.visa? '' : null}, v)));
  sel.value = STATE.visa;
  q5.appendChild(sel); pad.appendChild(q5);

  // 生成按钮
  const goBtn = el('button',{class:'go', id:'go', onClick:()=>generate(Object.assign({},STATE), {polish: polishWanted})}, '⌖ 生成我的材料清单');
  pad.appendChild(goBtn);

  // 润色开关 + 预设
  const foot = el('div',{class:'quiz-foot'});
  foot.appendChild(el('span',{class:'preset'}, '快速套用典型情况：'));
  foot.appendChild(el('button',{class:'preset-b', onClick:()=>applyPreset({credit:'no',income:'no',usGuarantor:'no',visa:'F-1',noCreditPlan:'service'})}, '国际学生 · 担保服务'));
  foot.appendChild(el('button',{class:'preset-b', onClick:()=>applyPreset({credit:'no',income:'no',usGuarantor:'yes',visa:'F-1',noCreditPlan:'guarantor'})}, '有 US guarantor'));
  foot.appendChild(el('button',{class:'preset-b', onClick:()=>applyPreset({credit:'no',income:'no',usGuarantor:'no',visa:'F-1',noCreditPlan:'prepay'})}, '预付租金'));
  foot.appendChild(el('button',{class:'preset-b', onClick:()=>applyPreset({credit:'yes',income:'yes',usGuarantor:'no',visa:'OPT / STEM-OPT',noCreditPlan:'service'})}, '有信用+收入'));
  pad.appendChild(foot);

  // 润色复选
  const polishRow = el('div',{class:'quiz-foot'});
  const cb = el('input',{type:'checkbox', id:'polishCb', style:{margin:'0 6px 0 0', cursor:'pointer'},
    onChange:(e)=>{ polishWanted = e.target.checked; }});
  const lbl = el('label',{for:'polishCb', style:{fontSize:'12.5px', color:'var(--ink-3)', cursor:'pointer', display:'inline-flex', alignItems:'center'}},
    [cb, '（可选）连接 AI 后，把清单措辞润色得更友好']);
  polishRow.appendChild(lbl);
  pad.appendChild(polishRow);

  return box;
}

function applyPreset(p){
  Object.assign(STATE, p);
  // 重置 select
  const sel = document.querySelector('#quiz select.field'); if(sel) sel.value = STATE.visa;
  onProfileChange();
  toast('已套用，正在生成…');
  generate(Object.assign({},STATE), {polish: polishWanted});
}

/* ════════════════ 首屏 ════════════════ */
function home(){
  const app = document.getElementById('app');
  clear(app);

  app.appendChild(el('div',{class:'hero'},
    el('div',{class:'eyebrow'}, '签约前的最后一步 · 把材料一次列清'),
    el('h1',null, ['几个问题，', el('br'), '生成你这一单的', el('span',{class:'em'},'签约材料清单'), '——中英对照，每条都讲清', el('span',{class:'em'},'为什么需要')]),
    el('p',{class:'lede'},
      '回答几个关于信用 / 收入 / 担保的小问题，自动生成个性化、中英双语的签约材料 checklist。'+
      '国际学生最常卡的 guarantor 路径会被显著标出。只列材料、不替你判断房源，'+
      '最终一律以具体房东 / 楼盘要求为准。')
  ));

  app.appendChild(aiBar());
  app.appendChild(buildQuiz());

  mountResults = el('div'); app.appendChild(mountResults);

  onProfileChange();
  // 首屏即渲染默认身份组合的完整清单（无需任何输入或 key）
  renderChecklist(buildChecklist(DEFAULT_PROFILE));
}

/* ════════════════ 开发自检钩子 ════════════════ */
window.CHECKLIST_DEV = {
  build: buildChecklist,
  branches: {
    has_credit: ()=>buildChecklist({credit:'yes',income:'yes',usGuarantor:'no',visa:'OPT / STEM-OPT',noCreditPlan:'service'}),
    us_guarantor: ()=>buildChecklist({credit:'no',income:'no',usGuarantor:'yes',visa:'F-1',noCreditPlan:'guarantor'}),
    service: ()=>buildChecklist({credit:'no',income:'no',usGuarantor:'no',visa:'F-1',noCreditPlan:'service'}),
    prepay: ()=>buildChecklist({credit:'no',income:'no',usGuarantor:'no',visa:'F-1',noCreditPlan:'prepay'})
  },
  render: renderChecklist,
  text: checklistText,
  DEFAULT_PROFILE
};

home();
})();
</script>
