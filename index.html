<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>好玩的东西 · 项目 · 思考</title>
<meta name="description" content="可亲手体验的产品 Demo、关于 AI 组织架构与开发流程的思考，以及自我介绍。" />
<meta property="og:title" content="好玩的东西 · 项目 · 思考" />
<meta property="og:description" content="可亲手体验的产品 Demo + 关于 AI 的思考。" />
<!-- 字体已本地化（Fraunces 自托管 + CJK 系统字体栈），见 assets/style.css -->
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<nav class="nav">
  <div class="wrap">
    <a class="brand" href="index.html">好玩的东西</a>
    <div class="nav-links">
      <a href="#projects">项目</a>
      <a href="#thoughts">思考</a>
      <a href="#about">关于</a>
      <a href="#contact">联系</a>
    </div>
  </div>
</nav>

<header class="hero wrap">
  <div class="kicker" id="h-kicker"></div>
  <h1 id="h-title"></h1>
  <p class="lede" id="h-lede"></p>
  <div class="meta" id="h-pills"></div>
</header>

<!-- 自我介绍 -->
<section class="intro wrap" id="about">
  <div class="intro-card">
    <div class="who">
      <div class="name" id="a-name"></div>
      <div class="role" id="a-role"></div>
      <p id="a-blurb"></p>
      <div class="ln" id="a-facts"></div>
    </div>
    <a class="btn btn-primary" id="a-site" href="#" target="_blank" rel="noopener"></a>
  </div>
</section>

<!-- 项目卡片墙 -->
<section class="wrap" id="projects">
  <div class="section-head">
    <h2>项目 Demo</h2>
    <span class="note">点开任意一张，亲手体验</span>
  </div>
  <div class="grid" id="proj-grid"></div>
</section>

<!-- 思考 -->
<section class="wrap" id="thoughts">
  <div class="section-head">
    <h2>一些思考</h2>
    <span class="note">关于把 AI 真正用进组织与流程</span>
  </div>
  <div class="thoughts" id="thought-grid"></div>
</section>

<!-- 联系 / 留下想法 -->
<section class="wrap" id="contact">
  <div class="section-head">
    <h2>联系 · 留下你的想法</h2>
    <span class="note">想合作、想做点什么、或有具体需求都欢迎</span>
  </div>
  <div class="contact-card" id="contact-card"></div>
</section>

<footer>
  <div class="wrap">
    <div class="big">与其用一页文档说服你，不如让你亲手点几下</div>
    <p>这里的东西会持续增加。欢迎体验，也欢迎转发。</p>
    <p style="margin-top:14px"><a id="f-site" href="#" target="_blank" rel="noopener">个人网站 ↗</a></p>
    <hr class="hair" style="margin:32px auto;max-width:200px">
    <p class="disc">说明：项目均为可点击产品原型（Demo），用于演示与可行性探讨，非生产系统——
       无真实后端、支付、物流与 AI 模型，数据为演示用途。</p>
  </div>
</footer>

<script src="data.js"></script>
<script>
  const S = window.SITE, P = window.PROJECTS;
  const $ = id => document.getElementById(id);

  // Hero
  $("h-kicker").textContent = S.hero.kicker;
  $("h-title").innerHTML = S.hero.title;
  $("h-lede").textContent = S.hero.lede;
  $("h-pills").innerHTML = S.hero.pills.map(t => `<span class="pill">${t}</span>`).join("");

  // 自我介绍
  $("a-name").textContent = S.author.name;
  $("a-role").textContent = S.author.role;
  $("a-blurb").textContent = S.author.blurb;
  $("a-facts").innerHTML = S.author.facts.map(f => `<span>${f}</span>`).join("");
  $("a-site").href = S.author.site; $("a-site").textContent = S.author.siteLabel;
  $("f-site").href = S.author.site;

  // 联系 / 留下想法
  const c = S.contact || {};
  const formBtn = c.formUrl
    ? `<a class="btn btn-primary" href="${c.formUrl}" target="_blank" rel="noopener">${c.formLabel || "留下需求"} →</a>`
    : `<span class="btn btn-primary" style="opacity:.55;cursor:default">${c.formLabel || "留下需求"}（即将开放）</span>`;
  const emailBtn = c.email
    ? `<a class="btn btn-ghost" href="mailto:${c.email}?subject=关于你的项目，我有个想法">发邮件 ✉</a>` : "";
  const linkedinLine = c.linkedin
    ? `<div class="c-line"><span class="c-k">LinkedIn</span>
        <a class="c-v" href="${c.linkedin}" target="_blank" rel="noopener"
           style="color:var(--accent);text-decoration:none">查看主页 ↗</a></div>` : "";
  const qr = c.wechatQR
    ? `<img class="wx-qr" src="${c.wechatQR}" alt="微信二维码"
         onerror="this.style.display='none'">` : "";
  $("contact-card").innerHTML = `
    <p class="c-intro">${c.intro || ""}</p>
    <div class="c-row">
      <div class="c-methods">
        <div class="c-line"><span class="c-k">微信</span>
          <button class="c-copy" onclick="copyText('${c.wechatId}', this)">${c.wechatId}　复制</button></div>
        ${c.email ? `<div class="c-line"><span class="c-k">邮箱</span><span class="c-v">${c.email}</span></div>` : ""}
        ${linkedinLine}
        <div class="c-cta">${formBtn}${emailBtn}</div>
      </div>
      ${qr}
    </div>`;

  function copyText(t, el){
    navigator.clipboard?.writeText(t).then(() => {
      const old = el.textContent; el.textContent = "已复制 ✓";
      setTimeout(() => el.textContent = old, 1600);
    });
  }
  window.copyText = copyText;

  // 项目卡片
  $("proj-grid").innerHTML = P.map(p => {
    const tags = p.tags.map(t => `<span>${t}</span>`).join("");
    if (!p.url) {
      return `<div class="card soon">
        <div class="no">${p.no}</div><div class="ck">${p.kicker}</div>
        <h3>${p.title}</h3><div class="sub">${p.subtitle}</div>
        <div class="tags">${tags}</div><div class="go">即将上线</div></div>`;
    }
    return `<a class="card" href="project.html?id=${p.id}">
      <div class="no">${p.no}</div><div class="ck">${p.kicker}</div>
      <h3>${p.title}</h3><div class="sub">${p.subtitle}</div>
      <div class="tags">${tags}</div>
      <div class="go">查看 · 亲手体验 →</div></a>`;
  }).join("");

  // 思考卡片（有 play 字段则默认进互动版，并显示角标）
  $("thought-grid").innerHTML = S.thoughts.map(t => {
    const badge = t.play ? `<span class="play-badge">✦ 互动版</span>` : "";
    const go = t.play ? "边玩边读 →" : "阅读 →";
    return `<a class="tcard" href="${t.play || t.href}">
      <div class="ck">${t.kicker}</div>
      <h3>${t.title}${badge}</h3><p>${t.desc}</p>
      <div class="go">${go}</div></a>`;
  }).join("");
</script>
</body>
</html>
